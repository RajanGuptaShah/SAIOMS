version: '3.9'

# ────────────────────────────────────────────────────────────────────────────
# SAIOMS — Production Docker Compose v2
# Services: mongodb · redis · ml-service · backend · nginx (reverse proxy)
# ────────────────────────────────────────────────────────────────────────────

services:

  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: saioms-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: saioms
    volumes:
      - mongo-data:/data/db
    networks:
      - saioms-net
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Redis (LRU cache + session store) ────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: saioms-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    volumes:
      - redis-data:/data
    networks:
      - saioms-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── ML Microservice (Python + FastAPI + CLIP) ─────────────────────────────
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: saioms-ml
    restart: unless-stopped
    environment:
      MONGO_URI: mongodb://mongodb:27017
      DB_NAME: ${DB_NAME:-saioms}
      QR_SECRET: ${QR_SECRET}
      QR_SALT: ${QR_SALT}
      SERVER_URL: http://nginx:80/ml
    volumes:
      - ml-static:/app/static
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - saioms-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 15s
      retries: 4
      start_period: 60s # CLIP model needs time to load

  # ── Backend (Node.js + Express) ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: saioms-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017
      DB_NAME: ${DB_NAME:-saioms}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ML_SERVICE_URL: http://ml-service:8001
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      SERPAPI_KEY: ${SERPAPI_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
    volumes:
      - avatars-data:/app/static/avatars
    depends_on:
      mongodb:
        condition: service_healthy
      ml-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - saioms-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 20s
      timeout: 10s
      retries: 4
      start_period: 20s

  # ── Frontend (React/Vite build → nginx) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "" # empty = same origin (served via nginx)
    container_name: saioms-frontend
    restart: unless-stopped
    networks:
      - saioms-net

  # ── Nginx Reverse Proxy ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: saioms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - avatars-data:/app/static/avatars:ro # serve avatars directly
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - saioms-net
    healthcheck:
      test: [ "CMD", "nginx", "-t" ]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  mongo-data:
  ml-static:
  redis-data:
  avatars-data:
    # persistent profile photos

    # ── Networks ──────────────────────────────────────────────────────────────────
networks:
  saioms-net:
    driver: bridge
