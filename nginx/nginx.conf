worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream backend {
        server backend:5000;
        keepalive 16;
    }

    upstream ml_service {
        server ml-service:8001;
        keepalive 8;
    }

    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ── Main server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # ── API routes → backend ──────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── Health check (backend) ────────────────────────────────────────────
        location /health {
            proxy_pass http://backend/health;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── ML service routes ─────────────────────────────────────────────────
        location /ml/ {
            rewrite ^/ml/(.*)$ /$1 break;
            proxy_pass         http://ml_service;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 90s;   # CLIP inference can be slow on CPU
        }

        # ── Static avatar files (served directly by nginx) ─────────────────
        location /static/avatars/ {
            alias /app/static/avatars/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Swagger docs ──────────────────────────────────────────────────────
        location /api/docs {
            proxy_pass http://backend/api/docs;
            proxy_set_header Host $host;
        }

        # ── Frontend (SPA fallback) ────────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            # SPA history fallback
            proxy_intercept_errors on;
            error_page 404 = @fallback;
        }

        location @fallback {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
        }
    }
}
